<!DOCTYPE html>
<html lang="en" data-page="auth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Furniture Shop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body data-page="auth">
  <main class="form-shell">
    <div class="auth-layout">
      <section class="auth-art" data-reveal>
        <a class="brand" href="index.html"><span class="brand__mark">F</span><span>Furniture Shop</span></a>
        <div>
          <span class="eyebrow">Create account</span>
          <h1>Join the furniture shop experience.</h1>
          <p>Register as a customer to browse, reserve, order, and receive receipts automatically by email.</p>
        </div>
      </section>
      <section class="auth-card" data-reveal data-delay="1">
        <span class="eyebrow">Register</span>
        <h1>Create your profile</h1>
        <p>Fill in the form to create a new customer account.</p>
        <div id="registerMessage" class="badge badge--warning" style="display:none;"></div>
        <form id="registerForm" class="form" action="#" method="post" novalidate>
          <div class="field"><label for="regName">Full Name</label><input id="regName" name="name" type="text" placeholder="Your name"></div>
          <div class="field"><label for="regEmail">Email</label><input id="regEmail" name="email" type="email" placeholder="you@example.com"></div>
          <div class="field"><label for="regPhone">Phone</label><input id="regPhone" name="phone" type="text" placeholder="09xxxxxxxxx"></div>
          <div class="field"><label for="regAddress">Address</label><textarea id="regAddress" name="address" rows="3" placeholder="Your address"></textarea></div>
          <div class="field"><label for="regPassword">Password</label><input id="regPassword" name="password" type="password" placeholder="Create a password"></div>
          <button class="btn btn--primary" type="submit">Register</button>
        </form>
        <p style="margin-top: 1rem;">Already have an account? <a href="login.html" style="color: var(--brand-dark); font-weight: 700;">Login here</a>.</p>
      </section>
    </div>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
